name: Build

on:
  push:
    branches:
      - master
      - actions
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04 / Qt 5.15.2
            runs_on: ubuntu-22.04
            host: linux
            qt_version: "5.15.2"
            qt_arch: gcc_64
          - name: Ubuntu 22.04 / Qt 6.6.2
            runs_on: ubuntu-22.04
            host: linux
            qt_version: "6.6.2"
            qt_arch: gcc_64
          - name: Debian 12 / Qt 5.15.2
            runs_on: ubuntu-22.04
            container: debian:12
            host: linux
            qt_version: "5.15.2"
            qt_arch: gcc_64
          - name: Debian 12 / Qt 6.6.2
            runs_on: ubuntu-22.04
            container: debian:12
            host: linux
            qt_version: "6.6.2"
            qt_arch: gcc_64
          - name: macOS / Qt 5.15.2
            runs_on: macos-latest
            host: mac
            qt_version: "5.15.2"
            qt_arch: clang_64
          - name: macOS / Qt 6.6.2
            runs_on: macos-latest
            host: mac
            qt_version: "6.6.2"
            qt_arch: clang_64

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: matrix.host == 'linux'
        run: |
          set -e
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential pkg-config freerdp2-dev libwinpr2-dev mesa-common-dev libglu1-mesa-dev libegl1 libxkbcommon0
          else
            apt-get update
            apt-get install -y build-essential pkg-config freerdp2-dev libwinpr2-dev mesa-common-dev libglu1-mesa-dev libegl1 libxkbcommon0
          fi
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtcharts
          install-deps: false
          cache: true
      - name: Show qmake version
        run: qmake -v
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          qmake ../src/xenadminqt.pro
      - name: Build project
        run: |
          cd build
          if [ "$RUNNER_OS" = "macOS" ]; then
            make -j"$(sysctl -n hw.logicalcpu)"
          else
            make -j"$(nproc)"
          fi

  build-arm64:
    name: arm64 / Qt 6.7.0
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglu1-mesa-dev libegl1-mesa-dev libxkbcommon-dev
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.0
          host: linux_arm64
          target: desktop
          arch: linux_gcc_arm64
          modules: qtcharts
          install-deps: false
          cache: true
      - name: Show qmake version
        run: qmake -v
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          qmake ../src/xenadminqt.pro
      - name: Build project
        run: |
          cd build
          make -j"$(nproc)"

  build-riscv64:
    name: riscv64 / Qt (system) / native runner
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            qt6-base-dev qt6-charts-dev \
            libglu1-mesa-dev libegl1-mesa-dev libxkbcommon-dev
      - name: Show qmake version
        run: qmake6 -v
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          qmake6 ../src/xenadminqt.pro
      - name: Build project
        run: |
          cd build
          time make -j"$(nproc)"

  build-riscv64-cross:
    name: riscv64 / cross-compile / CMake on x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Add riscv64 architecture
        run: |
          sudo dpkg --add-architecture riscv64
          # Limit existing amd64 sources to avoid package conflicts with riscv64 arch
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb /deb [arch=amd64,i386] /' /etc/apt/sources.list
          fi
          # Handle DEB822 format (Ubuntu 24.04+) by restricting arch on existing stanzas
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Types:/a Architectures: amd64 i386' "$f" || true
          done
          echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports noble main universe" | \
            sudo tee /etc/apt/sources.list.d/riscv64-ports.list
          sudo apt-get update

      - name: Install cross-compiler and host Qt6 tools
        run: |
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            g++-riscv64-linux-gnu \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev

      - name: Install riscv64 Qt6 libraries (target sysroot)
        run: |
          sudo apt-get install -y \
            qt6-base-dev:riscv64 \
            qt6-charts-dev:riscv64 \
            libssl-dev:riscv64 \
            libglu1-mesa-dev:riscv64 \
            libxkbcommon-dev:riscv64

      - name: Locate host Qt6 tools path
        run: |
          QT6_BIN=$(dirname "$(command -v qmake6 || command -v qmake)")
          QT_HOST_TOOLS=$(dirname "$QT6_BIN")
          echo "QT_HOST_TOOLS=$QT_HOST_TOOLS" >> "$GITHUB_ENV"
          echo "Host Qt6 tools found at: $QT_HOST_TOOLS"

      - name: Configure (cross-compilation)
        run: |
          cmake -B build-cross \
            -DCMAKE_TOOLCHAIN_FILE=toolchains/riscv64-linux-gnu.cmake \
            -DQT_HOST_PATH="$QT_HOST_TOOLS" \
            -DQt6_DIR=/usr/lib/riscv64-linux-gnu/cmake/Qt6 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build (cross, timed)
        run: |
          time ninja -C build-cross -j"$(nproc)"
